<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard Perkembangan TO — Persiapan Kelas 12</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --color-unggul:#22c55e;--color-stabil:#3b82f6;--color-waspada:#eab308;--color-kritis:#ef4444;--color-unknown:#94a3b8;
  --bg-page:#f8fafc;--bg-card:#ffffff;--bg-stripe:#f8fafc;--border:#e2e8f0;
  --text-main:#0f172a;--text-sub:#475569;--text-muted:#94a3b8;
}
*{box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;font-size:14px;color:var(--text-main);background:var(--bg-page);margin:0;}
h1,h2,h3{font-family:'DM Sans',sans-serif;font-weight:700;margin:0;}
.label{font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-sub);}
.stat-number{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:700;line-height:1.1;}
.stat-sub{font-size:12px;color:var(--text-sub);}
.app{display:grid;grid-template-columns:340px 1fr;height:100vh;}
.sidebar{border-right:1px solid var(--border);background:var(--bg-card);display:flex;flex-direction:column;overflow:hidden;}
.brand{padding:16px 18px 10px;}
.brand h2{font-size:17px;}
.brand .sub{font-size:12px;color:var(--text-sub);margin-top:2px;}
.metrics{display:flex;gap:8px;padding:0 18px 12px;}
.metric{flex:1;background:var(--bg-page);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.metric .n{font-family:'DM Sans';font-weight:700;font-size:18px;}
.metric .l{font-size:10px;color:var(--text-sub);text-transform:uppercase;letter-spacing:.04em;}
.controls{padding:0 18px 10px;display:flex;flex-direction:column;gap:8px;}
#search{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;}
#minto{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;}
.pills{display:flex;flex-wrap:wrap;gap:6px;padding:0 18px 8px;}
.pill{padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-sub);font-size:12px;font-family:'DM Sans';font-weight:500;cursor:pointer;transition:.15s;}
.pill:hover{border-color:#94a3b8;color:var(--text-main);}
.pill.active{background:var(--text-main);color:#fff;border-color:var(--text-main);}
#count{padding:4px 18px;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
#list{flex:1;overflow-y:auto;padding:4px 10px 16px;}
.list-item{padding:9px 11px;border-radius:9px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;}
.list-item:hover{background:var(--bg-page);}
.list-item.sel{background:#eff6ff;border-color:#bfdbfe;}
.li-main{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.li-name{font-weight:600;font-size:13px;}
.li-sub{font-size:11px;color:var(--text-sub);margin-top:2px;}
.mini-flag{display:inline-block;background:#eef2ff;color:#4338ca;border-radius:4px;padding:0 5px;margin-left:4px;font-size:10px;font-weight:600;}
.mini-flag.khos{background:#faf5ff;color:#7e22ce;}
.tier-badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;font-family:'DM Sans';white-space:nowrap;}
.tier-badge.big{font-size:13px;padding:4px 14px;}
.tier-unggul{background:#f0fdf4;color:#15803d;}
.tier-stabil{background:#eff6ff;color:#1d4ed8;}
.tier-waspada{background:#fefce8;color:#854d0e;}
.tier-kritis{background:#fef2f2;color:#b91c1c;}
.tier-unknown{background:#f8fafc;color:#475569;}
.main{overflow-y:auto;padding:22px 28px;}
.rep-head{margin-bottom:16px;}
.rep-title-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.rep-title-row h1{font-size:24px;}
.rep-meta{font-size:13px;color:var(--text-sub);margin-top:4px;}
.banner{margin-top:10px;border-radius:9px;padding:9px 14px;font-size:13px;}
.banner.switch{background:#eef2ff;border:1px solid #c7d2fe;color:#3730a3;}
.banner.khos{background:#faf5ff;border:1px solid #e9d5ff;color:#6b21a8;}
.banner.warn{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.tile{background:var(--bg-card);border:1px solid var(--border);border-radius:11px;padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.tile .label{margin-bottom:5px;}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.chart-card .cc{height:240px;margin-top:8px;position:relative;}
.chart-card .cc.tall{height:320px;}
.chart-card.span2{grid-column:1/-1;}
.report{display:flex;flex-direction:column;gap:13px;}
.rep-sec{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.rep-sec h3{font-size:15px;margin-bottom:7px;color:var(--text-main);}
.rep-sec p{margin:0;line-height:1.62;color:#1e293b;font-size:14px;}
.rep-sec p + p{margin-top:9px;}
.rep-sec .lead{display:block;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;color:#0f172a;margin-bottom:1px;}
.rep-sec b{color:var(--text-main);}
.track-flag{display:inline-block;background:#eef2ff;color:#4338ca;border-radius:5px;padding:1px 7px;font-weight:600;}
.empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:15px;}
@media(max-width:980px){.app{grid-template-columns:1fr;height:auto;}.sidebar{height:auto;max-height:50vh;}.tiles{grid-template-columns:repeat(2,1fr);}.charts{grid-template-columns:1fr;}}
.printbtn{position:fixed;right:20px;bottom:20px;z-index:50;background:var(--text-main);color:#fff;border:none;border-radius:999px;padding:11px 18px;font-family:'DM Sans';font-weight:600;font-size:13px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.18);}
@media print{
  .sidebar,.printbtn{display:none!important;}
  .app{display:block;height:auto;}
  .main{overflow:visible;padding:0;}
  .rep-sec,.tile,.card{break-inside:avoid;page-break-inside:avoid;box-shadow:none;}
  body{background:#fff;}
  @page{size:A4;margin:14mm;}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h2>Perkembangan Belajar TO</h2>
      <div class="sub">Analisis psikometri · persiapan kelas 12</div>
    </div>
    <div class="metrics">
      <div class="metric"><div class="n" id="m-total">–</div><div class="l">Siswa</div></div>
      <div class="metric"><div class="n" id="m-switch">–</div><div class="l">Pindah Jalur</div></div>
      <div class="metric"><div class="n" id="m-khos">–</div><div class="l">Peserta KHOS</div></div>
    </div>
    <div class="controls">
      <input id="search" placeholder="Cari nama atau NOPES…">
      <select id="minto">
        <option value="0">Semua jumlah TO</option>
        <option value="3">Min. 3 TO</option>
        <option value="5">Min. 5 TO</option>
        <option value="7">Min. 7 TO</option>
      </select>
    </div>
    <div class="pills" id="pills"></div>
    <div id="count"></div>
    <div id="list"></div>
  </aside>
  <main class="main">
    <div id="panel"><div class="empty">Pilih siswa dari daftar untuk melihat laporan.</div></div>
  </main>
</div>
<button class="printbtn" onclick="window.print()">🖨️ Cetak / Unduh PDF</button>

<script>/* ============================================================
   MESIN NARASI PSIKOMETRI
   Menghasilkan laporan naratif per siswa dari statistik nyata:
   - slope regresi (kemiringan kurva belajar) per fase
   - koefisien variasi (volatilitas / kestabilan)
   - mastery per mapel + diagnosis TKA (konsep vs kecepatan vs penalaran)
   - konteks split IPA/IPS & perpindahan jalur
   - progres TO KHOS
   Bukan template if-else dangkal: tiap kalimat dihitung dari angka siswa.
   ============================================================ */

const LBL = window.__META.mapel_label;
const MAPEL_IPA = window.__META.mapel_ipa;
const MAPEL_IPS = window.__META.mapel_ips;
const MAPEL_UNIV = window.__META.mapel_univ;

// ---- Tier headline (skala 0-100 flat, lanjutan versi sebelumnya) ----
function tierOf(v) {
  if (v == null) return { key: 'unknown', label: 'Belum Cukup Data' };
  if (v >= 60) return { key: 'unggul', label: 'Unggul' };
  if (v >= 48) return { key: 'stabil', label: 'Stabil' };
  if (v >= 38) return { key: 'waspada', label: 'Waspada' };
  return { key: 'kritis', label: 'Kritis' };
}

// ---- Zona referensi grafik (permintaan: Kurang/Cukup/Superior) ----
function zonaOf(v) {
  if (v == null) return '-';
  if (v <= 30) return 'Kurang';
  if (v < 70) return 'Cukup';
  return 'Superior';
}

function fmt(x, d = 1) {
  if (x == null || isNaN(x)) return '–';
  return Number(x).toFixed(d).replace('.', ',');
}

// Interpretasi arah slope rerata (poin per TO)
function arahSlope(slope) {
  if (slope >= 4) return { kata: 'menanjak tajam', sign: 'pos' };
  if (slope >= 1.2) return { kata: 'naik bertahap', sign: 'pos' };
  if (slope > -1.2) return { kata: 'cenderung datar', sign: 'flat' };
  if (slope > -4) return { kata: 'menurun bertahap', sign: 'neg' };
  return { kata: 'menurun tajam', sign: 'neg' };
}

// Interpretasi kestabilan dari koefisien variasi
function kestabilan(cv) {
  if (cv == null) return 'belum terukur';
  if (cv < 8) return 'sangat stabil';
  if (cv < 15) return 'cukup stabil';
  if (cv < 25) return 'fluktuatif';
  return 'sangat fluktuatif';
}

// ====== SEKSI 1: Ringkasan posisi ======
function seksiRingkasan(s) {
  const t = tierOf(s.overall);
  const parts = [];
  let nama = s.nama;
  if (s.overall == null) {
    return { title: 'Ringkasan Posisi', tier: t,
      html: `<p>${nama} belum memiliki nilai TO akademik yang cukup untuk dianalisis. ${s.khos ? 'Namun tercatat mengikuti TO KHOS — lihat bagian KHOS di bawah.' : ''}</p>` };
  }
  parts.push(`Sepanjang seluruh TO yang diikuti, <b>${nama}</b> memiliki rerata akademik <b>${fmt(s.overall)}</b> dari skala 0–100, menempatkannya pada kategori <b>${t.label}</b>.`);
  if (s.rank) {
    parts.push(`Di angkatan <b>${s.angkatan}</b>, posisinya peringkat <b>${s.rank}</b> dari ${s.rank_total} siswa.`);
  }
  // konteks zona
  const z = zonaOf(s.overall);
  parts.push(`Pada skema zona grafik, rerata ini berada di zona <b>${z}</b> (Kurang ≤30, Cukup 30–70, Superior ≥70).`);
  if (s.is_switcher) parts.push(`Catatan penting: siswa ini <b>berpindah jalur</b> selama fase penjurusan — detail di bawah.`);
  return { title: 'Ringkasan Posisi', tier: t, html: '<p>' + parts.join(' ') + '</p>' };
}

// ====== SEKSI 2 & 3: Perkembangan per fase ======
function seksiFase(s, faseKey, judul, rentang, konteks) {
  const f = s[faseKey];
  if (!f || f.tos.length === 0) {
    return { title: judul, html: `<p>Tidak ada data TO pada fase ini (${rentang}).</p>` };
  }
  const parts = [];
  const a = arahSlope(f.slope);
  const stab = kestabilan(f.cv);
  parts.push(`Pada fase ${rentang}, ${konteks} ${s.nama} mengikuti <b>${f.tos.length} TO</b> (TO ${f.tos.join(', ')}) dengan rerata fase <b>${fmt(f.mean)}</b>.`);

  if (f.tos.length >= 2) {
    const delta = f.last - f.first;
    const deltaTxt = delta >= 0 ? `naik ${fmt(Math.abs(delta))} poin` : `turun ${fmt(Math.abs(delta))} poin`;
    parts.push(`Kurva belajarnya <b>${a.kata}</b> (kemiringan ${fmt(f.slope, 2)} poin/TO): dari ${fmt(f.first)} di TO ${f.tos[0]} menjadi ${fmt(f.last)} di TO ${f.tos[f.tos.length - 1]} — ${deltaTxt}.`);
    parts.push(`Pola nilainya tergolong <b>${stab}</b> (rentang ${fmt(f.min)}–${fmt(f.max)}).`);
    // interpretasi jujur
    if (a.sign === 'neg' && f.mean < 45) {
      parts.push(`Ini sinyal yang perlu perhatian: tren menurun di tingkat rerata yang sudah rendah. Perlu intervensi belajar terarah, bukan sekadar menunggu TO berikutnya.`);
    } else if (a.sign === 'pos' && f.mean >= 55) {
      parts.push(`Ini momentum yang baik: peningkatan konsisten di level yang sudah memadai — pertahankan ritme belajarnya.`);
    } else if (stab === 'sangat fluktuatif') {
      parts.push(`Fluktuasi setajam ini biasanya menandakan kesiapan yang tidak merata antar-TO (mood, kondisi, atau materi tertentu) — bukan kemampuan dasar yang berubah-ubah.`);
    }
  } else {
    parts.push(`Baru ada satu TO di fase ini sehingga tren belum bisa disimpulkan.`);
  }

  // konteks track untuk fase 2
  if (faseKey === 'fase2') {
    if (s.has_penjurusan) {
      if (s.track_note) {
        parts.push(`<span class="track-flag">⇄ ${s.track_note}</span> Karena itu, mapel di luar jalur yang sedang diikuti sengaja dikosongkan di TO bersangkutan dan tidak dihitung sebagai nol.`);
      } else if (s.final_track) {
        parts.push(`Di fase ini siswa berada di jalur <b>${s.final_track}</b>; mapel lawan-jurusan yang kosong adalah konsekuensi penjurusan, bukan nilai nol.`);
      }
    } else {
      parts.push(`Siswa ini berada di program <b>tanpa penjurusan</b>, jadi tetap mengerjakan seluruh mapel di setiap TO — perkembangannya dibaca utuh lintas semua bidang.`);
    }
  }
  return { title: judul, html: '<p>' + parts.join(' ') + '</p>' };
}

// ====== SEKSI 4: Peta kekuatan & kelemahan + diagnosis TKA ======
function seksiMapel(s) {
  const m = s.mastery;
  if (!m || Object.keys(m).length === 0) {
    return { title: 'Peta Kekuatan & Kelemahan Mapel', html: '<p>Belum ada data mapel akademik.</p>' };
  }
  const entries = Object.entries(m).sort((a, b) => b[1] - a[1]);
  const top = entries.slice(0, 3);
  const bot = entries.slice(-3).reverse();
  const parts = [];

  // Pembuka — apa arti angka mapel
  parts.push(`<span class="lead">Apa arti bagian ini?</span> Setiap mapel diberi nilai rata-rata 0–100 dari semua TO yang diikuti. Semakin tinggi angkanya, semakin kuat penguasaan ${s.nama} di mapel itu. Acuan sederhananya: <b>di bawah 30 = masih kurang</b>, <b>30–70 = cukup</b>, dan <b>70 ke atas = sudah kuat</b>.`);

  parts.push(`<span class="lead">Mapel yang sudah menonjol:</span> ${top.map(([k, v]) => `<b>${LBL[k]}</b> (${fmt(v)} — ${zonaOf(v).toLowerCase()})`).join(', ')}. Inilah modal yang sebaiknya dijaga, jangan sampai ikut turun karena perhatian habis ke mapel lain.`);

  parts.push(`<span class="lead">Mapel yang paling perlu dibantu:</span> ${bot.map(([k, v]) => `<b>${LBL[k]}</b> (${fmt(v)} — ${zonaOf(v).toLowerCase()})`).join(', ')}. Justru di sinilah peningkatan paling cepat terasa: menaikkan mapel terlemah dari 25 ke 40 jauh lebih mudah dan berdampak besar ke rata-rata dibanding memaksa mapel kuat dari 80 ke 90.`);

  // Diagnosis TKA berbasis MAT — dijelaskan untuk awam
  const ct = s.core_trace;
  if (ct && ct.MAT && ct.MAT.vals.length >= 2) {
    const matVals = ct.MAT.vals;
    const matMean = matVals.reduce((a, b) => a + b, 0) / matVals.length;
    const matStd = Math.sqrt(matVals.reduce((a, b) => a + (b - matMean) ** 2, 0) / matVals.length);
    const matCV = matMean ? (matStd / matMean) * 100 : 0;
    let diag;
    if (matMean < 30 && matCV < 30) {
      diag = `<span class="lead">Membaca akar masalah Matematika:</span> nilai Matematika ${s.nama} rendah <b>dan stabil di angka rendah</b> (rata-rata ${fmt(matMean)}, naik-turunnya kecil). Pola "selalu rendah, jarang berubah" ini biasanya berarti <b>ada konsep dasar yang belum nyangkut</b> — bukan sekadar kurang teliti. Ibarat membangun rumah, fondasinya yang perlu diperkuat dulu. Yang dibutuhkan: mengulang materi dari bab-bab dasar secara perlahan, bukan langsung dikejar latihan soal cepat.`;
    } else if (matCV >= 35) {
      diag = `<span class="lead">Membaca akar masalah Matematika:</span> nilai Matematika ${s.nama} <b>naik-turun tajam</b> (rata-rata ${fmt(matMean)}, tapi sangat berubah-ubah antar-TO). Pola seperti ini biasanya menandakan <b>kemampuannya sebenarnya ada, tetapi belum stabil saat ujian</b> — bisa karena kurang teliti, terburu-buru, atau gugup mengejar waktu. Yang dibutuhkan: latihan rutin terjadwal dan membiasakan diri mengerjakan soal dalam batas waktu, supaya hasilnya konsisten.`;
    } else {
      diag = `<span class="lead">Membaca akar masalah Matematika:</span> nilai Matematika ${s.nama} ada di rata-rata ${fmt(matMean)} dengan naik-turun sedang. Ini campuran antara pemahaman konsep dan kecepatan mengerjakan. Latihan rutin yang terjadwal — sedikit tapi setiap hari — akan paling membantu menaikkannya.`;
    }
    parts.push(diag);
  }

  // Literasi vs numerasi — dengan penjelasan kenapa penting
  if (m.IND != null && m.MAT != null) {
    const gap = m.IND - m.MAT;
    if (gap >= 20) parts.push(`<span class="lead">Catatan keseimbangan:</span> kemampuan membaca-memahami (B. Indonesia ${fmt(m.IND)}) jauh di atas kemampuan berhitung-menalar angka (Matematika ${fmt(m.MAT)}). Karena ujian masuk PTN menuntut keduanya, <b>penalaran angka inilah pekerjaan rumah terbesar</b> menuju kelas 12.`);
    else if (gap <= -15) parts.push(`<span class="lead">Catatan keseimbangan:</span> menariknya, kemampuan berhitung-menalar (Matematika ${fmt(m.MAT)}) di sini lebih kuat daripada membaca-memahami (B. Indonesia ${fmt(m.IND)}) — pola yang jarang ditemui. Jaga keduanya agar tetap seimbang.`);
  }
  return { title: 'Peta Kekuatan & Kelemahan Mapel', html: parts.map(p => `<p>${p}</p>`).join('') };
}

// ====== SEKSI 5: KHOS ======
function seksiKhos(s) {
  if (!s.khos) return null;
  const k = s.khos;
  const parts = [];
  const a = arahSlope(k.slope);
  parts.push(`${s.nama} tercatat mengikuti <b>TO KHOS</b> sebanyak ${k.series.length} kali (slot TO ${k.series.map(e => e.to).join(', ')}), dengan rerata KHOS <b>${fmt(k.mean)}</b>.`);
  if (k.series.length >= 2) {
    parts.push(`Progres KHOS-nya <b>${a.kata}</b>: dari ${fmt(k.first)} ke ${fmt(k.last)}.`);
  }
  const k1 = k.series.find(e => e.detail);
  if (k1) {
    const det = Object.entries(k1.detail).map(([n, v]) => `${n} ${fmt(v)}`).join(', ');
    parts.push(`Pada KHOS pertama (TO ${k1.to}) tersedia rincian: ${det}. KHOS berikutnya hanya berupa rerata.`);
  } else {
    parts.push(`Seluruh entri KHOS hanya berupa nilai rerata tanpa rincian mapel.`);
  }
  return { title: 'Capaian TO KHOS', html: '<p>' + parts.join(' ') + '</p>' };
}

// ====== SEKSI 6: Langkah konkret / alarm jujur ======
function seksiLangkah(s) {
  const parts = [];
  const t = tierOf(s.overall);
  const m = s.mastery || {};
  const entries = Object.entries(m).sort((a, b) => a[1] - b[1]);
  const lemah = entries.slice(0, 2).map(([k]) => LBL[k]);
  const kuat = Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, 1).map(([k]) => LBL[k]);

  // Penjelasan posisi dengan analogi
  parts.push(`<span class="lead">Di mana posisi ${s.nama} sekarang?</span> Dengan rata-rata <b>${fmt(s.overall)}</b>, ia masuk kategori <b>${t.label}</b>. Berikut arti dan langkah praktisnya untuk orang tua dan siswa.`);

  if (t.key === 'kritis') {
    parts.push(`<span class="lead">Apa artinya:</span> kategori <b>Kritis</b> berarti jaraknya ke target masih jauh dan butuh perhatian serius sekarang, bukan nanti. Ini bukan vonis — masih ada waktu — tetapi cara belajar yang sekarang belum cukup dan perlu diubah.`);
    parts.push(`<span class="lead">Langkah yang disarankan:</span> (1) Fokuskan energi ke <b>dua mapel paling lemah dulu</b>: ${lemah.join(' & ')}. Memperbaiki yang paling bawah memberi kenaikan rata-rata tercepat. (2) Buat jadwal belajar kecil tapi rutin — 30–45 menit setiap hari lebih efektif daripada 4 jam sekali seminggu. (3) Orang tua bisa membantu dengan menanyakan "tadi belajar bab apa?" secara rutin, bukan menunggu nilai TO berikutnya keluar. (4) Jika memungkinkan, minta pendampingan guru/tutor khusus untuk mapel terlemah.`);
  } else if (t.key === 'waspada') {
    parts.push(`<span class="lead">Apa artinya:</span> kategori <b>Waspada</b> berarti posisinya belum aman tapi sangat bisa diselamatkan dengan usaha terarah dalam beberapa bulan ke depan.`);
    parts.push(`<span class="lead">Langkah yang disarankan:</span> (1) Prioritaskan ${lemah.join(' & ')} — ini titik ungkit terbesar. (2) Jaga mapel yang sudah lumayan (seperti ${kuat[0] || 'mapel terkuatnya'}) agar tidak ikut melemah saat perhatian pindah. (3) Pertahankan kehadiran penuh di setiap TO; absen membuat perkembangan sulit dipantau. (4) Evaluasi tiap 2 TO: apakah mapel lemah mulai naik? Jika belum, ubah metode belajarnya.`);
  } else if (t.key === 'stabil') {
    parts.push(`<span class="lead">Apa artinya:</span> kategori <b>Stabil</b> berarti fondasinya sudah cukup baik. Tugas berikutnya adalah naik kelas ke level unggul, bukan sekadar bertahan.`);
    parts.push(`<span class="lead">Langkah yang disarankan:</span> (1) Geser fokus dari "menambal yang lemah" ke "mempertajam yang sudah kuat" — di level ini, memperdalam mapel andalan (${kuat[0] || 'mapel terkuat'}) bisa jadi pembeda. (2) Tetap rawat ${lemah.join(' & ')} agar tidak jadi titik lemah yang menahan rata-rata. (3) Mulai kenalkan soal-soal tipe HOTS / penalaran tingkat lanjut untuk membiasakan tantangan yang lebih tinggi.`);
  } else if (t.key === 'unggul') {
    parts.push(`<span class="lead">Apa artinya:</span> kategori <b>Unggul</b> berarti ${s.nama} sudah di jajaran atas. Tantangan utamanya kini bukan menaikkan nilai, tapi <b>menjaga konsistensi</b> hingga kelas 12.`);
    parts.push(`<span class="lead">Langkah yang disarankan:</span> (1) Pertahankan ritme belajar yang sudah berjalan — jangan kendor karena merasa sudah aman. (2) Rapikan mapel yang masih sedikit tertinggal (${lemah.join(' & ')}) agar profilnya makin merata. (3) Manfaatkan posisi ini untuk mulai membidik target PTN/jurusan yang lebih tinggi, dan latih soal-soal tersulit sebagai persiapan.`);
  } else {
    parts.push(`<span class="lead">Catatan:</span> data TO ${s.nama} belum cukup untuk memberi rekomendasi yang terarah. Langkah terpenting saat ini sederhana: <b>pastikan ia mengikuti TO berikutnya secara penuh</b> supaya perkembangannya bisa dibaca dengan benar.`);
  }

  // Momentum antar-fase — dijelaskan maknanya
  if (s.fase1 && s.fase2 && s.fase1.tos.length >= 2 && s.fase2.tos.length >= 2) {
    const d = s.fase2.mean - s.fase1.mean;
    if (d <= -6) {
      const konteks = s.has_penjurusan
        ? 'Penurunan ini sering muncul saat siswa baru menyesuaikan diri dengan penjurusan — perlu pendampingan ekstra di masa transisi ini.'
        : 'Perlu dicari tahu penyebabnya: apakah materi makin sulit, motivasi menurun, atau ada hal lain di luar akademik.';
      parts.push(`<span class="lead">Tren yang perlu diwaspadai:</span> rata-rata paruh akhir (${fmt(s.fase2.mean)}) <b>turun</b> dibanding paruh awal (${fmt(s.fase1.mean)}). ${konteks}`);
    } else if (d >= 6) {
      parts.push(`<span class="lead">Kabar baik:</span> rata-rata paruh akhir <b>membaik</b> (${fmt(s.fase1.mean)} → ${fmt(s.fase2.mean)}). Apa pun yang dilakukan belakangan ini tampaknya berhasil — pertahankan.`);
    }
  }
  return { title: 'Langkah Konkret untuk Orang Tua & Siswa', html: parts.map(p => `<p>${p}</p>`).join('') };
}

function buildReport(s) {
  const secs = [];
  secs.push(seksiRingkasan(s));
  secs.push(seksiFase(s, 'fase1', 'Perkembangan Fase 1 · TO 1–5', 'TO 1–5', 'pada paruh awal,'));
  const f2title = s.has_penjurusan
    ? 'Perkembangan Fase 2 · TO 6–10 (Setelah Penjurusan)'
    : 'Perkembangan Fase 2 · TO 6–10';
  secs.push(seksiFase(s, 'fase2', f2title, 'TO 6–10', 'pada paruh akhir,'));
  secs.push(seksiMapel(s));
  const kh = seksiKhos(s);
  if (kh) secs.push(kh);
  secs.push(seksiLangkah(s));
  return secs.filter(Boolean);
}

window.buildReport = buildReport;
window.tierOf = tierOf;
window.zonaOf = zonaOf;
window.fmtNum = fmt;
</script>
<script>/* ============ APP LOGIC ============ */
const STUD = window.__DATA.students.filter(s => s.angkatan !== 'Tidak Valid');
const META = window.__META;
let activeAngkatan = 'all';
let activeChart = [];

const ANGKATAN = ['XI SKS 2 Tahun', 'XI SKS 3 Tahun', 'X SKS 3 Tahun'];

// ---- Zona ambang grafik (custom plugin) ----
const zonePlugin = {
  id: 'zones',
  beforeDraw(chart) {
    const { ctx, chartArea, scales } = chart;
    if (!chartArea || !scales.y) return;
    const y = scales.y;
    const bands = [
      { from: 0, to: 30, color: 'rgba(239,68,68,0.06)', line: '#ef4444', label: 'Kurang (≤30)' },
      { from: 30, to: 70, color: 'rgba(234,179,8,0.05)', line: '#eab308', label: 'Cukup (30–70)' },
      { from: 70, to: 100, color: 'rgba(34,197,94,0.06)', line: '#22c55e', label: 'Superior (≥70)' },
    ];
    ctx.save();
    bands.forEach(b => {
      const yTop = y.getPixelForValue(Math.min(b.to, y.max));
      const yBot = y.getPixelForValue(Math.max(b.from, y.min));
      ctx.fillStyle = b.color;
      ctx.fillRect(chartArea.left, yTop, chartArea.right - chartArea.left, yBot - yTop);
    });
    // garis ambang 30 & 70
    [30, 70].forEach((v, i) => {
      const yp = y.getPixelForValue(v);
      if (yp < chartArea.top || yp > chartArea.bottom) return;
      ctx.beginPath();
      ctx.setLineDash([5, 4]);
      ctx.strokeStyle = i === 0 ? '#ef4444' : '#22c55e';
      ctx.lineWidth = 1;
      ctx.moveTo(chartArea.left, yp);
      ctx.lineTo(chartArea.right, yp);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = i === 0 ? '#b91c1c' : '#15803d';
      ctx.font = "600 10px 'DM Sans', sans-serif";
      ctx.textAlign = 'right';
      ctx.fillText(v === 30 ? 'Kurang ◂ 30 ▸ Cukup' : 'Cukup ◂ 70 ▸ Superior', chartArea.right - 4, yp - 3);
    });
    ctx.restore();
  }
};

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}

// ---- Sidebar list ----
function renderList() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const minTO = parseInt(document.getElementById('minto').value);
  const list = document.getElementById('list');
  list.innerHTML = '';
  let pool = STUD.slice();
  if (activeAngkatan !== 'all') pool = pool.filter(s => s.angkatan === activeAngkatan);
  if (minTO > 0) pool = pool.filter(s => s.n_to >= minTO);
  if (q) pool = pool.filter(s => (s.nama || '').toLowerCase().includes(q) || String(s.nopes).includes(q));
  pool.sort((a, b) => (b.overall ?? -1) - (a.overall ?? -1));
  document.getElementById('count').textContent = pool.length + ' siswa';
  pool.forEach(s => {
    const t = window.tierOf(s.overall);
    const it = el('div', 'list-item');
    it.innerHTML = `<div class="li-main"><span class="li-name">${s.nama}</span>
      <span class="tier-badge tier-${t.key}">${t.label}</span></div>
      <div class="li-sub">${s.kelas} · ${s.angkatan} · rerata ${window.fmtNum(s.overall)} · ${s.n_to} TO
      ${s.is_switcher ? '<span class="mini-flag">⇄ pindah jalur</span>' : ''}
      ${s.khos ? '<span class="mini-flag khos">KHOS</span>' : ''}</div>`;
    it.onclick = () => { document.querySelectorAll('.list-item').forEach(x => x.classList.remove('sel')); it.classList.add('sel'); renderReport(s); };
    list.appendChild(it);
  });
}

// ---- Report panel ----
function renderReport(s) {
  activeChart.forEach(c => { try { c.destroy(); } catch (e) {} });
  activeChart = [];
  const panel = document.getElementById('panel');
  const t = window.tierOf(s.overall);
  panel.innerHTML = '';

  // Header
  const head = el('div', 'rep-head');
  head.innerHTML = `<div class="rep-title-row">
      <h1>${s.nama}</h1>
      <span class="tier-badge big tier-${t.key}">${t.label}</span>
    </div>
    <div class="rep-meta">${s.kelas} · ${s.angkatan}${s.wali && s.wali !== '0' ? ' · Wali ' + s.wali : ''} · NOPES ${s.nopes}</div>`;
  if (s.is_switcher && s.track_note) head.appendChild(el('div', 'banner switch', `⇄ <b>${s.track_note}</b>`));
  if (s.khos) head.appendChild(el('div', 'banner khos', `★ Peserta TO KHOS — lihat bagian capaian KHOS di bawah.`));
  if (s.dup_notes && s.dup_notes.length) head.appendChild(el('div', 'banner warn', `⚠ Catatan data: ${s.dup_notes.join('; ')}.`));
  panel.appendChild(head);

  // Stat tiles
  const tiles = el('div', 'tiles');
  const f1 = s.fase1, f2 = s.fase2;
  const tileData = [
    ['Rerata Keseluruhan', window.fmtNum(s.overall), `zona ${window.zonaOf(s.overall)}`],
    ['Peringkat Angkatan', s.rank ? `${s.rank}/${s.rank_total}` : '–', s.angkatan],
    ['Tren Fase 1 (TO1–5)', f1 ? (f1.slope >= 0 ? '+' : '') + window.fmtNum(f1.slope, 2) : '–', f1 ? `rerata ${window.fmtNum(f1.mean)}` : 'tak ada data'],
    ['Tren Fase 2 (TO6–10)', f2 ? (f2.slope >= 0 ? '+' : '') + window.fmtNum(f2.slope, 2) : '–', f2 ? `rerata ${window.fmtNum(f2.mean)}` : 'tak ada data'],
  ];
  tileData.forEach(([l, v, sub]) => {
    tiles.appendChild(el('div', 'tile', `<div class="label">${l}</div><div class="stat-number">${v}</div><div class="stat-sub">${sub}</div>`));
  });
  panel.appendChild(tiles);

  // Charts
  const chartsWrap = el('div', 'charts');
  chartsWrap.innerHTML = `
    <div class="card chart-card"><div class="label">Tren Rerata per TO (dua fase)</div><div class="cc"><canvas id="cTrend"></canvas></div></div>
    <div class="card chart-card"><div class="label">Mastery per Mapel</div><div class="cc"><canvas id="cBar"></canvas></div></div>
    <div class="card chart-card span2"><div class="label">Radar Penguasaan Mapel</div><div class="cc tall"><canvas id="cRadar"></canvas></div></div>`;
  panel.appendChild(chartsWrap);

  // Reports
  const reps = window.buildReport(s);
  const repWrap = el('div', 'report');
  reps.forEach(sec => {
    const block = el('div', 'rep-sec');
    block.innerHTML = `<h3>${sec.title}</h3>${sec.html}`;
    repWrap.appendChild(block);
  });
  panel.appendChild(repWrap);

  // KHOS chart if present
  if (s.khos) {
    const kc = el('div', 'card chart-card', `<div class="label">Progres TO KHOS</div><div class="cc"><canvas id="cKhos"></canvas></div>`);
    repWrap.appendChild(kc);
  }

  // Draw charts (try/catch so report always shows)
  try { drawCharts(s); } catch (e) { console.warn('chart error', e); }
  panel.scrollTop = 0;
}

function drawCharts(s) {
  const tierColor = c => ({ unggul: '#22c55e', stabil: '#3b82f6', waspada: '#eab308', kritis: '#ef4444' }[c] || '#94a3b8');

  // Trend chart: two phases combined on TO axis 1..10
  const f1 = s.fase1, f2 = s.fase2;
  const allTOs = [];
  for (let i = 1; i <= 10; i++) allTOs.push(i);
  const dataMap = {};
  if (f1) f1.tos.forEach((to, i) => dataMap[to] = f1.rerata[i]);
  if (f2) f2.tos.forEach((to, i) => dataMap[to] = f2.rerata[i]);
  const trendVals = allTOs.map(to => dataMap[to] ?? null);

  const ctx1 = document.getElementById('cTrend');
  if (ctx1) {
    activeChart.push(new Chart(ctx1, {
      type: 'line',
      data: {
        labels: allTOs.map(t => 'TO' + t),
        datasets: [
          { label: 'Fase 1 (TO1–5)', data: trendVals.map((v, i) => allTOs[i] <= 5 ? v : null), borderColor: '#6366f1', backgroundColor: '#6366f1', tension: 0.25, spanGaps: true, pointRadius: 4 },
          { label: 'Fase 2 (TO6–10)', data: trendVals.map((v, i) => allTOs[i] >= 6 ? v : null), borderColor: '#0ea5e9', backgroundColor: '#0ea5e9', tension: 0.25, spanGaps: true, pointRadius: 4 },
        ]
      },
      options: { responsive: true, maintainAspectRatio: false,
        scales: { y: { min: 0, max: 100, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } },
        plugins: { legend: { position: 'bottom' } } },
      plugins: [zonePlugin]
    }));
  }

  // Bar mastery
  const m = s.mastery || {};
  const order = [...MAPEL_UNIV, ...MAPEL_IPA, ...MAPEL_IPS].filter(k => m[k] != null);
  const ctx2 = document.getElementById('cBar');
  if (ctx2 && order.length) {
    activeChart.push(new Chart(ctx2, {
      type: 'bar',
      data: { labels: order.map(k => META.mapel_label[k]),
        datasets: [{ data: order.map(k => m[k]),
          backgroundColor: order.map(k => m[k] <= 30 ? '#ef4444' : (m[k] < 70 ? '#eab308' : '#22c55e')) }] },
      options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
        scales: { x: { min: 0, max: 100, grid: { color: '#f1f5f9' } }, y: { grid: { display: false } } },
        plugins: { legend: { display: false } } }
    }));
  }

  // Radar
  const ctx3 = document.getElementById('cRadar');
  if (ctx3 && order.length >= 3) {
    activeChart.push(new Chart(ctx3, {
      type: 'radar',
      data: { labels: order.map(k => META.mapel_label[k]),
        datasets: [{ label: s.nama, data: order.map(k => m[k]),
          borderColor: '#0ea5e9', backgroundColor: 'rgba(14,165,233,0.15)', pointBackgroundColor: '#0ea5e9' }] },
      options: { responsive: true, maintainAspectRatio: false,
        scales: { r: { min: 0, max: 100, ticks: { stepSize: 20 } } },
        plugins: { legend: { display: false } } }
    }));
  }

  // KHOS chart
  if (s.khos) {
    const ctxk = document.getElementById('cKhos');
    if (ctxk) {
      activeChart.push(new Chart(ctxk, {
        type: 'line',
        data: { labels: s.khos.series.map(e => 'KHOS·TO' + e.to),
          datasets: [{ label: 'Rerata KHOS', data: s.khos.series.map(e => e.rerata), borderColor: '#a855f7', backgroundColor: '#a855f7', tension: 0.25, pointRadius: 5 }] },
        options: { responsive: true, maintainAspectRatio: false,
          scales: { y: { min: 0, max: 100, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } },
          plugins: { legend: { display: false } } },
        plugins: [zonePlugin]
      }));
    }
  }
}

// ---- Filters ----
function buildFilters() {
  const pills = document.getElementById('pills');
  const mk = (label, val) => {
    const b = el('button', 'pill' + (val === activeAngkatan ? ' active' : ''), label);
    b.onclick = () => { activeAngkatan = val; document.querySelectorAll('#pills .pill').forEach(p => p.classList.remove('active')); b.classList.add('active'); renderList(); };
    return b;
  };
  pills.appendChild(mk('Semua', 'all'));
  ANGKATAN.forEach(a => {
    const n = STUD.filter(s => s.angkatan === a).length;
    pills.appendChild(mk(`${a} (${n})`, a));
  });
}

// ---- Init ----
function init() {
  // summary numbers
  document.getElementById('m-total').textContent = STUD.length;
  document.getElementById('m-switch').textContent = META.n_switcher;
  document.getElementById('m-khos').textContent = META.n_khos;
  buildFilters();
  document.getElementById('search').addEventListener('input', renderList);
  document.getElementById('minto').addEventListener('change', renderList);
  renderList();
  // auto-select top student
  const first = STUD.filter(s => s.overall != null).sort((a, b) => b.overall - a.overall)[0];
  if (first) { renderReport(first); }
}
document.addEventListener('DOMContentLoaded', init);
</script>
